<!DOCTYPE html> <!--Informa ao navegador que este documento usa HTML 5-->
<html lang="pt-br"> <!-- Marca o inicio da pagina HTML. O atributo lang = "pt-br" indica que o idioma principal é o portugues-->
<head> <!--Aqui fica as configurações e informações que nao aparecem no corpo da pagina-->
    <meta charset="UTF-8"> <!--Define o padrão de caracteres, acentos,ç, emojis e caracteres especiais-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--Faz a pagina se adaptar a celulares, computadores e outras telas-->
    <title> Meu primeiro site</title>
</head> <!--Fecha a tag head-->
<body> <!--Corpo da pagina. Tudo que aparece para o usuario fica-->
    <h1>Bem vindo ao meu site!</h1>
    <h2>Site para estudo do meu  curso de full stack</h2>
    <p>Esta é uma estrutura de HTML básica</p>

    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    
</body>
</html>
